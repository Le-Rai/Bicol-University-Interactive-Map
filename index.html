        html, body, #map {
            width: 100%;

        }
        
        /* Floating Title Styling (Bottom Left) */
        #map-title {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000; /* Forces it to sit on top of the map layers */
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            pointer-events: none; /* Allows users to still click the map behind it */
        }

        /* Floating Credits Styling (Bottom Right) */
        /* Container to stack credits and QR code on the bottom right */
        /* Container on the bottom right */
        /* Container on the bottom right (stacks everything vertically) */
        #right-overlay-container {
            position: absolute;
            bottom: 25px; /* Offset to sit nicely above standard Leaflet attributions */
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Aligns everything neatly to the right edge */
            gap: 8px; /* Clean spacing between every stacked element */
        }

        /* Styling for the Suggestion Hyperlink */
        #form-link {
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            font-family: 'Open Sans', sans-serif;
            font-size: 11px;
            font-weight: bold;
            color: #0056b3;
            text-decoration: none;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        /* Hover effect for the link button */
        #form-link:hover {
            color: #003570;
            background: rgba(240, 240, 240, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Floating Credits Styling */
        #map-credits {

            padding: 5px 10px;
            font-family: 'Open Sans', sans-serif;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    var img = popup._contentNode.querySelector('td img');
                    if (img) {
                        // If already loaded (cache), update immediately
                        if (img.complete && img.naturalHeight > 0) {
                            popup.update();
                        } else {
                            img.addEventListener('load', function() {
                                popup.update();
                            });
                            img.addEventListener('error', function() {
                                popup.update();
                            });
                        }
                    }
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
